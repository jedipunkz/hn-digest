name: HN digest

on:
  schedule:
    # every 6 hours (UTC)
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: hn-digest
  cancel-in-progress: false

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        run: go build -o bin/hn-digest ./cmd/hn-digest

      - name: Crawl and translate
        env:
          GOOGLE_TRANSLATE_API_KEY: ${{ secrets.GOOGLE_TRANSLATE_API_KEY }}
        run: ./bin/hn-digest --section topstories --limit 20

      - name: Commit and push changes
        run: |
          set -euo pipefail
          if [[ -z "$(git status --porcelain -- contents)" ]]; then
            echo "No digest changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add contents
          git commit -m "chore: update hn digest"
          git pull --rebase origin main || {
            echo "::warning::Could not rebase digest changes onto main; skipping push."
            exit 0
          }
          git push origin HEAD:main || {
            echo "::warning::Could not push digest changes; skipping."
            exit 0
          }
